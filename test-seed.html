<!DOCTYPE html>
<html>
<head>
    <title>Test Seed Data</title>
</head>
<body>
    <h1>Insertar Datos de Catálogo</h1>
    <button onclick="seedData()">Insertar Datos</button>
    <div id="result"></div>

    <script>
        async function seedData() {
            try {
                const response = await fetch('https://localhost:7009/api/seed/catalog-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = 
                    '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
